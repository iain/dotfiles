format = """
$username\
$hostname\
$localip\
$shlvl\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$character"""

# Explicit list (instead of $all) so starship doesn't probe for ~30 language manifests every prompt.
right_format = """\
$package\
$dotnet\
$java\
$nodejs\
$bun\
$ruby\
$python\
$golang\
$rust\
$cmd_duration\
$jobs\
$status\
"""

scan_timeout = 30
command_timeout = 500

[line_break]
disabled = true

[gcloud]
disabled = true

[aws]
symbol = "  "

[directory]
read_only = " 󰌾"
style = "blue"

[dotnet]
# Drop `project.json` (used by Nx) so JS monorepos don't falsely trigger .NET.
detect_files = ["global.json", "Directory.Build.props", "Directory.Build.targets", "Packages.props", "*.csproj", "*.fsproj", "*.xproj"]

[docker_context]
symbol = " "

[git_branch]
symbol = " "
style = "cyan"
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_commit]
tag_symbol = '  '
style = "green"

[git_status]
style = "purple"
format = '([$all_status$ahead_behind]($style) )'
ahead = '↑'
diverged = '↕'
behind = '↓'

[golang]
format = '[$symbol($version )]($style)'
symbol = " "

[hostname]
ssh_symbol = " "

[java]
format = '[${symbol}(${version} )]($style)'
symbol = " "

[nix_shell]
symbol = " "

[nodejs]
format = '[$symbol($version )]($style)'
symbol = " "
style = "green"

[package]
symbol = "󰏗 "
format = '[$symbol$version]($style) '

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "

[ruby]
symbol = " "
style = "red"
format = '[$symbol($version )]($style)'

[rust]
format = '[$symbol($version )]($style)'
symbol = "󱘗 "

[bun]
symbol = " "

[gradle]
symbol = " "
