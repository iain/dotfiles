add_newline = false

format = """
$username\
$hostname\
$localip\
$shlvl\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character"""

scan_timeout = 10
command_timeout = 200

[line_break]
disabled = true

[character]
# Spectral's signature amber (#F9AD26).
success_symbol = '[❯](#F9AD26)'

[cmd_duration]
format = '[$duration]($style) '
style = 'yellow'

[directory]
read_only = " 󰌾"
# Spectral's signature amber (#F9AD26) — used for directories in the colorscheme itself.
style = "#F9AD26"

[git_branch]
symbol = " "
style = "blue"
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_commit]
tag_symbol = '  '
style = "green"

[git_status]
style = "purple"
format = '([$all_status$ahead_behind]($style) )'
ahead = '↑'
diverged = '↕'
behind = '↓'

# Privileged shells render as a "user@host" badge: amber background, black text
# (red for root). username + hostname share one continuous block (no " in ").
# Both modules appear only on SSH or under sudo, never on a plain local shell.
[username]
style_user = "fg:black bg:#F9AD26"
style_root = "fg:black bg:red"
format = '[ $user]($style)'

[hostname]
# Not ssh_only: also show under sudo (SUDO_USER) so root sees user@host too.
# detect_env_vars gates it to exactly SSH / sudo — never a plain local prompt.
ssh_only = false
detect_env_vars = ["SSH_CONNECTION", "SSH_CLIENT", "SSH_TTY", "SUDO_USER"]
style = "fg:black bg:#F9AD26"
format = '[@$hostname ]($style) '
