format = """
$username\
$hostname\
$localip\
$shlvl\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$character"""

# Explicit list (instead of $all) so starship doesn't probe for ~30 language manifests every prompt.
right_format = """\
$package\
$dotnet\
$java\
$nodejs\
$bun\
$ruby\
$python\
$golang\
$rust\
$cmd_duration\
$jobs\
$status\
"""

scan_timeout = 30
command_timeout = 500

[line_break]
disabled = true

[gcloud]
disabled = true

[aws]
symbol = "¯î¢  "

[directory]
read_only = " ¾░î¥"
style = "blue"

[dotnet]
format = '[$symbol($version )]($style)'
symbol = "¯Ø┐ "
# Drop `project.json` (used by Nx) so JS monorepos don't falsely trigger .NET.
detect_files = ["global.json", "Directory.Build.props", "Directory.Build.targets", "Packages.props", "*.csproj", "*.fsproj", "*.xproj"]

