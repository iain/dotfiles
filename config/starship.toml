add_newline = false

format = """
$username\
$hostname\
$localip\
$shlvl\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character"""

scan_timeout = 10
command_timeout = 200

[line_break]
disabled = true

[character]
# Spectral's signature amber (#F9AD26).
success_symbol = '[❯](bold #F9AD26)'

[cmd_duration]
format = '[$duration]($style) '
style = 'yellow'

[directory]
read_only = " 󰌾"
# Spectral's signature amber (#F9AD26) — used for directories in the colorscheme itself.
style = "#F9AD26"

[git_branch]
symbol = " "
style = "blue"
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_commit]
tag_symbol = '  '
style = "green"

[git_status]
style = "purple"
format = '([$all_status$ahead_behind]($style) )'
ahead = '↑'
diverged = '↕'
behind = '↓'

[hostname]
ssh_symbol = " "
